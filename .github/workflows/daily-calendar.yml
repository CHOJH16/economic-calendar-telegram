name: 매일 경제 캘린더 알림

on:
  schedule:
    - cron: "55 6 * * *"
      timezone: "Asia/Seoul"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-economic-calendar
  cancel-in-progress: false

jobs:
  send-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 저장소 파일 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 경제 캘린더 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PARSE_API_KEY: ${{ secrets.PARSE_API_KEY }}
          WAIT_UNTIL_7: ${{ github.event_name == 'schedule' }}
        run: python bot.py

      - name: 장기 미사용 중지 방지용 기록
        if: always()
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .heartbeat
          git config user.name "economic-calendar-bot"
          git config user.email "economic-calendar-bot@users.noreply.github.com"
          git add .heartbeat
          git diff --cached --quiet || git commit -m "자동 실행 상태 기록"
          git pull --rebase
          git push
